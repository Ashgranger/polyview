<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyview</title>
    <style>
        body {
            background-color: #f0f4ff;
            color: #2c3e50;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #3498db; 
            padding: 1em;
            text-align: center;
            color: white;
        }
        .loading-icon {
            animation: spin 1s infinite;
            display: inline-block;
            width: 20px;
            height: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .market {
            cursor: pointer;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #3498db;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .market:hover {
            background-color: #e1f5fe;
        }
    </style>
</head>
<body>
<header>
    <h1>Welcome to Polyview</h1>
</header>
<main>
    <div class="loading-icon"></div>
    <div class="markets">
        <div class="market" onclick="showMarketDetails('Market A')">Market A</div>
        <div class="market" onclick="showMarketDetails('Market B')">Market B</div>
        <!-- More Markets -->
    </div>
    <script>
        async function fetchMarkets() {
            try {
                const response = await fetch('/api/markets', { mode: 'cors' });
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error('Error fetching markets:', error);
            }
        }
        function showMarketDetails(market) {
            alert('Showing details for ' + market);
        }
        fetchMarkets();
    </script>
</main>
</body>
</html>
