<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLYVIEW — Polymarket Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #0c1120;
    --surface2: #111827;
    --border: #1e2d47;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --dimmed: #334155;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: orb 8s ease-in-out infinite alternate;
  }

  @keyframes orb {
    0% { transform: translate(0,0); }
    100% { transform: translate(300px, 200px); }
  }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }
  .logo em { color: var(--accent2); font-style: normal; }

  .live-dot {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .search-section { margin-bottom: 32px; }

  .search-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-prefix {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 14px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 14px 14px 14px 36px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.1);
  }

  input[type="text"]::placeholder { color: var(--dimmed); }

  .btn {
    padding: 14px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #33eaff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,255,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-outline {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }

  .examples {
    margin-top: 10px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }

  .examples-label { font-size: 10px; color: var(--dimmed); letter-spacing: 1px; text-transform: uppercase; }

  .example-tag {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .example-tag:hover { border-color: var(--accent); color: var(--accent); }

  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .tab {
    padding: 10px 18px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  #status {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
    display: none;
  }

  #status.visible { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: #fca5a5;
    font-size: 12px;
    margin-bottom: 24px;
    display: none;
  }

  .error-box.visible { display: block; }

  #profile-panel { display: none; }
  #profile-panel.visible { display: block; }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .profile-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    object-fit: cover;
    flex-shrink: 0;
  }

  .avatar-fallback {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }

  .profile-info { flex: 1; min-width: 0; }

  .profile-name {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .profile-address {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    word-break: break-all;
  }

  .profile-bio {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .profile-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    min-width: 280px;
  }

  .pstat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .pstat-val {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .pstat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent2); }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }

  .stat-val.green { color: var(--accent3); }
  .stat-val.red { color: var(--red); }
  .stat-val.cyan { color: var(--accent); }
  .stat-val.purple { color: var(--accent2); }
  .stat-val.yellow { color: var(--warn); }

  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .data-section { display: none; }
  .data-section.active { display: block; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .positions-list { display: flex; flex-direction: column; gap: 10px; }

  .pos-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s;
  }

  .pos-card:hover { border-color: var(--dimmed); }

  .pos-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .pos-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  .pos-outcome {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .outcome-yes { background: rgba(16,185,129,0.15); color: var(--accent3); border: 1px solid rgba(16,185,129,0.3); }
  .outcome-no { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  .pos-detail { font-size: 11px; color: var(--muted); }

  .pos-right { text-align: right; min-width: 120px; }

  .pos-value {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .pos-pnl {
    font-size: 11px;
    margin-top: 3px;
  }

  .pos-pnl.up { color: var(--accent3); }
  .pos-pnl.down { color: var(--red); }

  .price-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .price-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s ease;
  }

  .activity-table { width: 100%; border-collapse: collapse; }

  .activity-table th {
    text-align: left;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .activity-table td {
    padding: 12px;
    font-size: 11px;
    border-bottom: 1px solid rgba(30,45,71,0.5);
    vertical-align: middle;
  }

  .activity-table tr:last-child td { border-bottom: none; }
  .activity-table tr:hover td { background: rgba(255,255,255,0.02); }

  .type-badge {
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 1px;
    display: inline-block;
  }

  .type-buy { background: rgba(16,185,129,0.15); color: var(--accent3); }
  .type-sell { background: rgba(239,68,68,0.15); color: var(--red); }
  .type-redeem { background: rgba(245,158,11,0.15); color: var(--warn); }
  .type-reward { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .type-neutral { background: rgba(100,116,139,0.15); color: var(--muted); }

  .market-title-cell {
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tx-link {
    color: var(--accent2);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .tx-link:hover { color: var(--accent); }

  .trades-list { display: flex; flex-direction: column; gap: 8px; }

  .trade-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 80px 1fr 100px 100px 100px;
    gap: 12px;
    align-items: center;
    font-size: 11px;
    transition: border-color 0.15s;
  }

  .trade-row:hover { border-color: var(--dimmed); }

  .trade-num { font-family: 'Syne', sans-serif; font-weight: 600; color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dimmed);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .closed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    opacity: 0.75;
    transition: opacity 0.15s;
    margin-bottom: 8px;
  }

  .closed-card:hover { opacity: 1; }

  .closed-title { font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; margin-bottom: 4px; }
  .closed-meta { font-size: 10px; color: var(--muted); }

  .pnl-chip {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    text-align: center;
    white-space: nowrap;
  }

  .pnl-chip.win { background: rgba(16,185,129,0.15); color: var(--accent3); }
  .pnl-chip.loss { background: rgba(239,68,68,0.1); color: var(--red); }

  .table-wrap { overflow-x: auto; }

  .footer {
    text-align: center;
    padding: 24px 0 0;
    font-size: 10px;
    color: var(--dimmed);
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  @media (max-width: 700px) {
    .profile-card { flex-direction: column; align-items: flex-start; }
    .profile-stats { grid-template-columns: repeat(3, 1fr); min-width: auto; width: 100%; }
    .trade-row { grid-template-columns: 60px 1fr 80px; }
    .trade-row > *:nth-child(n+4) { display: none; }
    header { flex-direction: column; gap: 10px; align-items: flex-start; }
    .search-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">POLY<span>VIEW</span> <em>↗</em></div>
    <div class="live-dot">
      <div class="dot"></div>
      Polymarket Explorer
    </div>
  </header>

  <div class="search-section">
    <div class="search-label">Search Trader</div>
    <div class="search-row">
      <div class="search-input-wrap">
        <span class="search-prefix">⟡</span>
        <input type="text" id="searchInput" placeholder="0x wallet address or username…" autocomplete="off" spellcheck="false">
      </div>
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">Lookup</button>
      <button class="btn btn-outline" onclick="clearAll()">Clear</button>
    </div>
    <div class="examples">
      <span class="examples-label">Try:</span>
      <span class="example-tag" onclick="fillEx('cobie')">cobie</span>
      <span class="example-tag" onclick="fillEx('polymarket')">polymarket</span>
      <span class="example-tag" onclick="fillEx('0x6af75d4e4aaf700450efbac3708cce1665810ff1')">0x6af7…0ff1</span>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="status">
    <div class="spinner"></div>
    <div id="statusText">Fetching data…</div>
  </div>

  <div id="profile-panel">
    <div class="profile-card" id="profileCard"></div>
    <div class="stat-grid" id="statGrid"></div>
    <div class="tabs">
      <div class="tab active" data-tab="positions" onclick="switchTab('positions')">Positions</div>
      <div class="tab" data-tab="closed" onclick="switchTab('closed')">Closed</div>
      <div class="tab" data-tab="activity" onclick="switchTab('activity')">Activity</div>
      <div class="tab" data-tab="trades" onclick="switchTab('trades')">Trades</div>
    </div>
    <div class="data-section active" id="tab-positions"></div>
    <div class="data-section" id="tab-closed"></div>
    <div class="data-section" id="tab-activity"></div>
    <div class="data-section" id="tab-trades"></div>
  </div>

  <div class="footer">POLYVIEW — Powered by Polymarket Public API &nbsp;·&nbsp; Not affiliated with Polymarket</div>
</div>

<script>
const DATA = 'https://data-api.polymarket.com';
const GAMMA = 'https://gamma-api.polymarket.com';

function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function trunc(s,n=45){ return s && s.length>n ? s.slice(0,n)+'…' : (s||'—'); }
function shortAddr(a){ return a ? a.slice(0,6)+'…'+a.slice(-4) : ''; }
function fmtMoney(v,d=0){
  if(v===undefined||v===null||isNaN(v))return'—';
  const n=parseFloat(v);
  if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
  return'$'+n.toFixed(d);
}
function fmtPct(v){ if(v===undefined||v===null||isNaN(v))return'—'; const n=parseFloat(v); return(n>=0?'+':'')+n.toFixed(1)+'%'; }
function fmtDate(ts){
  if(!ts)return'—';
  const d=new Date(typeof ts==='number'&&ts<1e12?ts*1000:ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function fillEx(v){ document.getElementById('searchInput').value=v; doSearch(); }

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.data-section').forEach(s=>s.classList.toggle('active',s.id==='tab-'+tab));
}

function setStatus(msg,vis=true){
  const el=document.getElementById('status');
  el.classList.toggle('visible',vis);
  document.getElementById('statusText').textContent=msg;
}

function showErr(msg){
  const el=document.getElementById('errorBox');
  el.textContent='⚠ '+msg;
  el.classList.add('visible');
}
function clearErr(){ document.getElementById('errorBox').classList.remove('visible'); }

function clearAll(){
  document.getElementById('searchInput').value='';
  document.getElementById('profile-panel').classList.remove('visible');
  clearErr();
  setStatus('',false);
}

async function fetchJ(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status+' for '+url.split('?')[0]);
  return r.json();
}

async function resolveUsername(username){
  // Try GAMMA profiles
  try{
    const data=await fetchJ(`${GAMMA}/profiles?username=${encodeURIComponent(username)}`);
    if(Array.isArray(data)&&data.length>0&&data[0].proxyWallet)return data[0].proxyWallet;
    if(data&&data.proxyWallet)return data.proxyWallet;
  }catch(e){}
  // Try search
  try{
    const data=await fetchJ(`${GAMMA}/search?query=${encodeURIComponent(username)}&type=profile`);
    const list=data.profiles||data;
    if(Array.isArray(list)&&list.length>0&&list[0].proxyWallet)return list[0].proxyWallet;
  }catch(e){}
  throw new Error(`Username "${username}" not found. Try the full 0x wallet address.`);
}

async function doSearch(){
  const raw=document.getElementById('searchInput').value.trim();
  if(!raw)return;
  clearErr();
  setStatus('Resolving…');
  document.getElementById('profile-panel').classList.remove('visible');
  document.getElementById('searchBtn').disabled=true;

  try{
    let addr=raw;
    if(!/^0x[0-9a-fA-F]{40}$/i.test(raw)){
      setStatus('Looking up username…');
      addr=await resolveUsername(raw);
    }
    setStatus('Fetching profile & data…');

    const [profile,positions,closed,activity,trades]=await Promise.allSettled([
      fetchJ(`${GAMMA}/profiles/${addr}`),
      fetchJ(`${DATA}/positions?user=${addr}&sizeThreshold=.1&sortBy=CURRENT&limit=50`),
      fetchJ(`${DATA}/positions?user=${addr}&redeemed=true&sortBy=CASHPNL&limit=30`),
      fetchJ(`${DATA}/activity?user=${addr}&limit=50`),
      fetchJ(`${DATA}/trades?user=${addr}&limit=50`),
    ]);

    setStatus('',false);
    render(addr,profile,positions,closed,activity,trades);
    document.getElementById('profile-panel').classList.add('visible');
  }catch(e){
    setStatus('',false);
    showErr(e.message);
  }finally{
    document.getElementById('searchBtn').disabled=false;
  }
}

function render(addr,profileR,posR,clR,actR,trR){
  const p=profileR.status==='fulfilled'?profileR.value:null;
  const pos=posR.status==='fulfilled'&&Array.isArray(posR.value)?posR.value:[];
  const cl=clR.status==='fulfilled'&&Array.isArray(clR.value)?clR.value:[];
  const act=actR.status==='fulfilled'&&Array.isArray(actR.value)?actR.value:[];
  const tr=trR.status==='fulfilled'&&Array.isArray(trR.value)?trR.value:[];

  renderProfile(addr,p,pos,tr);
  renderStats(pos,cl,tr);
  renderPositions(pos);
  renderClosed(cl);
  renderActivity(act);
  renderTrades(tr);
  switchTab('positions');
}

function renderProfile(addr,p,pos,tr){
  const card=document.getElementById('profileCard');
  const name=p?.name||p?.pseudonym||shortAddr(addr);
  const initial=(name||'?')[0].toUpperCase();
  const imgSrc=p?.profileImage||p?.profileImageOptimized;
  const markets=new Set(tr.map(t=>t.conditionId).filter(Boolean)).size;

  card.innerHTML=`
    ${imgSrc
      ?`<img class="avatar" src="${esc(imgSrc)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="avatar-fallback" style="display:none">${initial}</div>`
      :`<div class="avatar-fallback">${initial}</div>`}
    <div class="profile-info">
      <div class="profile-name">${esc(name)}</div>
      <div class="profile-address">${esc(addr)}</div>
      ${p?.bio?`<div class="profile-bio">${esc(p.bio)}</div>`:''}
    </div>
    <div class="profile-stats">
      <div class="pstat"><div class="pstat-val">${pos.length}</div><div class="pstat-label">Open</div></div>
      <div class="pstat"><div class="pstat-val">${markets||tr.length}</div><div class="pstat-label">Markets</div></div>
      <div class="pstat"><div class="pstat-val">${tr.length}</div><div class="pstat-label">Trades</div></div>
    </div>
  `;
}

function renderStats(pos,cl,tr){
  const totalCur=pos.reduce((s,p)=>s+parseFloat(p.currentValue||0),0);
  const totalPnl=pos.reduce((s,p)=>s+parseFloat(p.cashPnl||0),0);
  const totalReal=cl.reduce((s,p)=>s+parseFloat(p.cashPnl||0),0);
  const totalVol=tr.reduce((s,t)=>s+parseFloat(t.size||0)*parseFloat(t.price||0),0);
  const buys=tr.filter(t=>t.side==='BUY').length;
  const sells=tr.filter(t=>t.side==='SELL').length;
  const wr=cl.length?(cl.filter(p=>parseFloat(p.cashPnl||0)>0).length/cl.length*100):null;

  document.getElementById('statGrid').innerHTML=[
    {label:'Portfolio Value',val:fmtMoney(totalCur,2),cls:'cyan',sub:`${pos.length} open positions`},
    {label:'Unrealized P&L',val:fmtMoney(totalPnl,2),cls:totalPnl>=0?'green':'red',sub:totalCur>0?fmtPct(totalPnl/totalCur*100):''},
    {label:'Realized P&L',val:fmtMoney(totalReal,2),cls:totalReal>=0?'green':'red',sub:`${cl.length} closed`},
    {label:'Total Volume',val:fmtMoney(totalVol),cls:'purple',sub:`${tr.length} trades`},
    {label:'Buy / Sell',val:`${buys}/${sells}`,cls:'yellow',sub:'trade split'},
    {label:'Win Rate',val:wr!==null?wr.toFixed(0)+'%':'—',cls:wr===null?'cyan':wr>=50?'green':'red',sub:'closed positions'},
  ].map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-val ${s.cls}">${s.val}</div>
      ${s.sub?`<div class="stat-sub">${s.sub}</div>`:''}
    </div>
  `).join('');
}

function renderPositions(pos){
  const el=document.getElementById('tab-positions');
  if(!pos.length){el.innerHTML='<div class="empty-state">No open positions found</div>';return;}
  el.innerHTML=`
    <div class="section-header">
      <div class="section-title">Open Positions</div>
      <div class="badge">${pos.length} markets</div>
    </div>
    <div class="positions-list">
      ${pos.map(p=>{
        const cur=parseFloat(p.currentValue||0);
        const pnl=parseFloat(p.cashPnl||0);
        const pct=parseFloat(p.percentPnl||0);
        const price=parseFloat(p.curPrice||0);
        const isYes=p.outcome==='Yes';
        return`<div class="pos-card">
          <div>
            <div class="pos-title">${esc(p.title||'Unknown Market')}</div>
            <div class="pos-meta">
              <span class="pos-outcome ${isYes?'outcome-yes':'outcome-no'}">${esc(p.outcome||'?')}</span>
              <span class="pos-detail">Avg: ${(parseFloat(p.avgPrice||0)*100).toFixed(1)}¢</span>
              <span class="pos-detail">Size: ${parseFloat(p.size||0).toFixed(0)} shares</span>
              <span class="pos-detail">Cur: ${(price*100).toFixed(1)}¢</span>
            </div>
            <div class="price-bar"><div class="price-fill" style="width:${Math.min(100,price*100).toFixed(1)}%"></div></div>
          </div>
          <div class="pos-right">
            <div class="pos-value">${fmtMoney(cur,2)}</div>
            <div class="pos-pnl ${pnl>=0?'up':'down'}">${fmtMoney(pnl,2)} (${fmtPct(pct)})</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderClosed(cl){
  const el=document.getElementById('tab-closed');
  if(!cl.length){el.innerHTML='<div class="empty-state">No closed positions found</div>';return;}
  el.innerHTML=`
    <div class="section-header">
      <div class="section-title">Closed Positions</div>
      <div class="badge">${cl.length} resolved</div>
    </div>
    ${cl.map(p=>{
      const pnl=parseFloat(p.cashPnl||0);
      const pct=parseFloat(p.percentPnl||0);
      return`<div class="closed-card">
        <div>
          <div class="closed-title">${esc(p.title||'Unknown Market')}</div>
          <div class="closed-meta">Outcome: ${esc(p.outcome||'?')} &nbsp;·&nbsp; Size: ${parseFloat(p.size||0).toFixed(0)} &nbsp;·&nbsp; Avg: ${(parseFloat(p.avgPrice||0)*100).toFixed(1)}¢</div>
        </div>
        <div class="pnl-chip ${pnl>=0?'win':'loss'}">${fmtMoney(pnl,2)}<br><small style="font-size:10px;font-weight:400">${fmtPct(pct)}</small></div>
      </div>`;
    }).join('')}
  `;
}

function renderActivity(act){
  const el=document.getElementById('tab-activity');
  if(!act.length){el.innerHTML='<div class="empty-state">No activity found</div>';return;}
  const tc={BUY:'type-buy',SELL:'type-sell',TRADE:'type-buy',REDEEM:'type-redeem',REWARD:'type-reward',SPLIT:'type-redeem',MERGE:'type-redeem',CONVERSION:'type-redeem'};
  el.innerHTML=`
    <div class="section-header">
      <div class="section-title">Activity Feed</div>
      <div class="badge">${act.length} events</div>
    </div>
    <div class="table-wrap">
      <table class="activity-table">
        <thead><tr><th>Type</th><th>Market</th><th>Side</th><th>Size</th><th>Price</th><th>Date</th><th>Tx</th></tr></thead>
        <tbody>
          ${act.map(a=>{
            const type=a.type||(a.side?'TRADE':'EVENT');
            const side=a.side||'';
            const cls=tc[type]||tc[side]||'type-neutral';
            const sideCls=side==='BUY'?'type-buy':side==='SELL'?'type-sell':'';
            const tx=a.transactionHash||'';
            return`<tr>
              <td><span class="type-badge ${cls}">${type}</span></td>
              <td><div class="market-title-cell" title="${esc(a.title||'')}">${esc(trunc(a.title||'—'))}</div></td>
              <td>${side?`<span class="type-badge ${sideCls}">${side}</span>`:'—'}</td>
              <td>${a.size?parseFloat(a.size).toFixed(2):'—'}</td>
              <td>${a.price?(parseFloat(a.price)*100).toFixed(1)+'¢':'—'}</td>
              <td>${fmtDate(a.timestamp)}</td>
              <td>${tx?`<a class="tx-link" href="https://polygonscan.com/tx/${tx}" target="_blank">${shortAddr(tx)}</a>`:'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderTrades(tr){
  const el=document.getElementById('tab-trades');
  if(!tr.length){el.innerHTML='<div class="empty-state">No trades found</div>';return;}
  el.innerHTML=`
    <div class="section-header">
      <div class="section-title">Recent Trades</div>
      <div class="badge">${tr.length} trades</div>
    </div>
    <div class="trades-list">
      ${tr.map(t=>{
        const side=t.side||t.takerSide||'?';
        const size=parseFloat(t.size||t.shares||0);
        const price=parseFloat(t.price||0);
        const cash=size*price;
        return`<div class="trade-row">
          <span class="type-badge ${side==='BUY'?'type-buy':'type-sell'}">${side}</span>
          <div style="font-size:11px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(trunc(t.title||t.market||'—',55))}</div>
          <span class="trade-num">${(price*100).toFixed(1)}¢</span>
          <span class="trade-num">${size.toFixed(1)}</span>
          <span class="trade-num">${fmtMoney(cash,2)}</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
