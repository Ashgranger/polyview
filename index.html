<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLYVIEW v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090e;--card:#0f1117;--card2:#14161f;--border:#1f2333;--border2:#252a3a;
  --accent:#4ade80;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;--red:#f87171;--yellow:#fbbf24;
  --text:#f1f5f9;--sub:#94a3b8;--dim:#3d4a63;--muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
/* NAV */
nav{background:rgba(8,9,14,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 16px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:0;height:52px}
.logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--text);margin-right:32px;white-space:nowrap}
.logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--card)}
.nav-tab.active{color:var(--accent);background:rgba(74,222,128,.08)}
/* PAGES */
.page{display:none;max-width:1200px;margin:0 auto;padding:20px 16px 60px}
.page.active{display:block}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
/* SEARCH BAR */
.search-wrap{position:relative;display:flex;gap:8px;margin-bottom:20px}
.search-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 14px 11px 40px;border-radius:8px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--dim)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.btn{padding:10px 18px;border-radius:7px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;transition:all .15s}
.btn-green{background:var(--accent);color:#000}.btn-green:hover{opacity:.9}
.btn-green:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
/* CHIPS */
.chips{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.chip-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;background:var(--card2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
/* GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.green{color:var(--accent)}.red{color:var(--red)}.blue{color:var(--blue)}.purple{color:var(--purple)}.orange{color:var(--orange)}.yellow{color:var(--yellow)}.white{color:var(--text)}
/* PROFILE BANNER */
.profile-banner{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;display:flex;align-items:center;gap:16px;margin-bottom:16px;position:relative;overflow:hidden}
.profile-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))}
.avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--border2);object-fit:cover;flex-shrink:0}
.av-fallback{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.pname{font-size:17px;font-weight:700;margin-bottom:3px}
.paddr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);word-break:break-all}
.pbio{font-size:12px;color:var(--sub);margin-top:4px}
.pquick{display:flex;gap:18px;margin-left:auto;flex-shrink:0}
.pq-item{text-align:center}
.pq-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--accent)}
.pq-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
/* TABS inside a page */
.inner-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px}
.inner-tab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.inner-tab:hover{color:var(--text)}
.inner-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.inner-section{display:none}.inner-section.active{display:block}
/* POSITIONS */
.pos-list{display:flex;flex-direction:column;gap:8px}
.pos-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px 15px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;transition:border-color .15s}
.pos-row:hover{border-color:var(--border2)}
.pos-title{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4}
.pos-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.badge-yes{background:rgba(74,222,128,.12);color:var(--accent);border:1px solid rgba(74,222,128,.25)}
.badge-no{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.badge-buy{background:rgba(74,222,128,.12);color:var(--accent)}
.badge-sell{background:rgba(248,113,113,.12);color:var(--red)}
.badge-gray{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.meta-txt{font-size:11px;color:var(--muted)}
.pos-right{text-align:right;min-width:100px}
.pos-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--blue)}
.pos-pnl{font-size:11px;margin-top:2px}
.pbar{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .6s}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border)}
.tbl td{padding:11px 10px;font-size:12px;border-bottom:1px solid rgba(31,35,51,.6);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tbl-wrap{overflow-x:auto}
.tcell-title{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.tx-link{color:var(--purple);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:10px}
.tx-link:hover{color:var(--blue)}
/* MARKET CARD */
.mkt-list{display:flex;flex-direction:column;gap:8px}
.mkt-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px;cursor:pointer;transition:border-color .15s}
.mkt-card:hover{border-color:var(--border2)}
.mkt-title{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4}
.mkt-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.mkt-prob{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.mkt-bar{height:6px;background:var(--border);border-radius:3px;margin:8px 0;overflow:hidden}
.mkt-fill{height:100%;border-radius:3px;transition:width .5s}
.fill-green{background:linear-gradient(90deg,var(--accent),#22d3ee)}
.fill-red{background:linear-gradient(90deg,var(--red),var(--orange))}
/* ORDERBOOK */
.ob-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ob-side{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px}
.ob-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ob-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:5px 0;font-size:11px;border-bottom:1px solid rgba(31,35,51,.4);position:relative}
.ob-row:last-child{border-bottom:none}
.ob-fill{position:absolute;top:0;bottom:0;right:0;opacity:.08;border-radius:2px;pointer-events:none}
.ob-ask .ob-fill{background:var(--red);left:0;right:auto}
.ob-bid .ob-fill{background:var(--accent);right:0;left:auto}
.ob-header{font-size:10px;color:var(--muted);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:0 0 6px;text-transform:uppercase;letter-spacing:1px}
.spread-box{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;text-align:center;font-size:11px;color:var(--muted);margin:8px 0}
/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.lb-row:hover{border-color:var(--border2)}
.lb-rank{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--dim);width:28px;flex-shrink:0;text-align:center}
.lb-rank.top1{color:#ffd700}.lb-rank.top2{color:#c0c0c0}.lb-rank.top3{color:#cd7f32}
.lb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:2px solid var(--border2)}
.lb-av img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-addr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.lb-stats{display:flex;gap:16px;text-align:right;flex-shrink:0}
.lb-stat{text-align:right}
.lb-stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.lb-stat-lbl{font-size:10px;color:var(--muted)}
/* FILTER ROW */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(74,222,128,.07)}
/* LOADING/EMPTY */
.loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:12px}
/* ERROR */
.err-box{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:12px 16px;color:#fca5a5;font-size:12px;margin-bottom:16px;display:none}
.err-box.show{display:block}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:20px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700;line-height:1.4;flex:1;margin-right:12px}
.close-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.close-btn:hover{color:var(--text);border-color:var(--border2)}
.modal-section{margin-bottom:18px}
.modal-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* SECTION HEADER */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px}
.count-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--card2);border:1px solid var(--border);color:var(--muted)}
/* SCORE BAR */
.score-bar{height:4px;border-radius:2px;margin-top:4px;background:var(--border);overflow:hidden}
.score-fill{height:100%;border-radius:2px}
/* RESPONSIVE */
@media(max-width:640px){
  .pquick{display:none}
  .ob-wrap{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .lb-stats{gap:10px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="logo">POLY<span>VIEW</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('trader')">👤 Trader</button>
      <button class="nav-tab" onclick="showPage('markets')">📊 Markets</button>
      <button class="nav-tab" onclick="showPage('leaderboard')">🏆 Leaderboard</button>
    </div>
  </div>
</nav>

<!-- ══════════════ TRADER PAGE ══════════════ -->
<div class="page active" id="page-trader">
  <div class="search-wrap" style="margin-top:16px">
    <span class="search-icon">⟡</span>
    <input class="search-input" id="traderInput" placeholder="Enter wallet address (0x…) or username" autocomplete="off" spellcheck="false">
    <button class="btn btn-green" id="traderBtn" onclick="lookupTrader()">Lookup</button>
    <button class="btn btn-ghost" onclick="clearTrader()">Clear</button>
  </div>
  <div class="chips">
    <span class="chip-label">Try:</span>
    <span class="chip" onclick="tryTrader('cobie')">cobie</span>
    <span class="chip" onclick="tryTrader('polymarket')">polymarket</span>
    <span class="chip" onclick="tryTrader('0x6af75d4e4aaf700450efbac3708cce1665810ff1')">0x6af7…0ff1</span>
  </div>
  <div class="err-box" id="traderErr"></div>
  <div id="traderLoading" class="loading" style="display:none"><div class="spinner"></div><div id="traderLoadTxt">Fetching…</div></div>
  <div id="traderResult" style="display:none">
    <div class="profile-banner" id="profileBanner"></div>
    <div class="stat-grid" id="traderStats"></div>
    <div class="inner-tabs">
      <div class="inner-tab active" data-sec="positions" onclick="switchSec('positions')">Positions</div>
      <div class="inner-tab" data-sec="closed" onclick="switchSec('closed')">Closed</div>
      <div class="inner-tab" data-sec="activity" onclick="switchSec('activity')">Activity</div>
      <div class="inner-tab" data-sec="trades" onclick="switchSec('trades')">Trades</div>
    </div>
    <div class="inner-section active" id="sec-positions"></div>
    <div class="inner-section" id="sec-closed"></div>
    <div class="inner-section" id="sec-activity"></div>
    <div class="inner-section" id="sec-trades"></div>
  </div>
</div>

<!-- ══════════════ MARKETS PAGE ══════════════ -->
<div class="page" id="page-markets">
  <div class="search-wrap" style="margin-top:16px">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="marketInput" placeholder="Search markets… (e.g. bitcoin, election, fed)" autocomplete="off" spellcheck="false">
    <button class="btn btn-green" id="marketBtn" onclick="searchMarkets()">Search</button>
  </div>
  <div class="filter-row">
    <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Trending:</span>
    <button class="filter-btn active" onclick="loadTrending('volume')">🔥 Top Volume</button>
    <button class="filter-btn" onclick="loadTrending('new')">✨ New</button>
    <button class="filter-btn" onclick="loadTrending('crypto')">₿ Crypto</button>
    <button class="filter-btn" onclick="loadTrending('politics')">🗳 Politics</button>
  </div>
  <div class="err-box" id="marketErr"></div>
  <div id="marketLoading" class="loading" style="display:none"><div class="spinner"></div>Loading markets…</div>
  <div id="marketList"></div>
</div>

<!-- ══════════════ LEADERBOARD PAGE ══════════════ -->
<div class="page" id="page-leaderboard">
  <div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 14px">
    <div>
      <div style="font-size:17px;font-weight:700;margin-bottom:3px">Top Traders</div>
      <div style="font-size:12px;color:var(--muted)">Ranked by profit · Polymarket official leaderboard</div>
    </div>
    <button class="btn btn-ghost" onclick="loadLeaderboard(currentLbWindow)" style="font-size:12px">↻ Refresh</button>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="loadLeaderboard('all')">All time</button>
    <button class="filter-btn" onclick="loadLeaderboard('1m')">1 Month</button>
    <button class="filter-btn" onclick="loadLeaderboard('1w')">1 Week</button>
    <button class="filter-btn" onclick="loadLeaderboard('1d')">24h</button>
  </div>
  <div class="err-box" id="lbErr"></div>
  <div id="lbLoading" class="loading" style="display:none"><div class="spinner"></div>Loading leaderboard…</div>
  <div id="lbList"></div>
</div>

<!-- MARKET DETAIL MODAL -->
<div class="modal-overlay" id="marketModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
/* ─── UTILS ─── */
const $=id=>document.getElementById(id);
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
const trunc=(s,n=50)=>s&&s.length>n?s.slice(0,n)+'…':(s||'—');
const shortAddr=a=>a?a.slice(0,6)+'…'+a.slice(-4):'';
function fmtMoney(v,d=0){
  if(v===undefined||v===null||isNaN(v))return'—';
  const n=parseFloat(v);
  if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
  return'$'+n.toFixed(d);
}
function fmtPct(v){if(v===undefined||v===null||isNaN(v))return'—';const n=parseFloat(v);return(n>=0?'+':'')+n.toFixed(1)+'%';}
function fmtDate(ts){
  if(!ts)return'—';
  const d=new Date(typeof ts==='number'&&ts<1e12?ts*1000:ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}
async function fetchJ(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
/* ─── APIS ─── */
const DATA='https://data-api.polymarket.com';
const GAMMA='https://gamma-api.polymarket.com';
const CLOB='https://clob.polymarket.com';
/* ─── NAVIGATION ─── */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+id));
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    const pages=['trader','markets','leaderboard'];
    t.classList.toggle('active',pages[i]===id);
  });
  if(id==='markets'&&!marketsLoaded)loadTrending('volume');
  if(id==='leaderboard'&&!lbLoaded)loadLeaderboard('all');
}
/* ─── TRADER SEARCH ─── */
function tryTrader(v){$('traderInput').value=v;lookupTrader();}
function clearTrader(){$('traderInput').value='';$('traderErr').classList.remove('show');$('traderLoading').style.display='none';$('traderResult').style.display='none';}
function setTraderErr(msg){$('traderErr').textContent='⚠ '+msg;$('traderErr').classList.add('show');}
function setTraderLoad(msg,show){$('traderLoading').style.display=show?'block':'none';$('traderLoadTxt').textContent=msg||'Fetching…';}

async function resolveUsername(username){
  // Try Gamma profiles by username
  try{
    const r=await fetch(`${GAMMA}/profiles?username=${encodeURIComponent(username)}`);
    if(r.ok){
      const d=await r.json();
      if(Array.isArray(d)&&d.length>0&&d[0].proxyWallet)return d[0].proxyWallet;
      if(d?.proxyWallet)return d.proxyWallet;
    }
  }catch(e){}
  // Try search endpoint
  try{
    const r=await fetch(`${GAMMA}/search?query=${encodeURIComponent(username)}&type=profile&limit=5`);
    if(r.ok){
      const d=await r.json();
      const list=d?.profiles||d?.results||d;
      if(Array.isArray(list)&&list.length>0&&list[0].proxyWallet)return list[0].proxyWallet;
    }
  }catch(e){}
  // Try single profile slug lookup
  try{
    const r=await fetch(`${GAMMA}/profiles?slug=${encodeURIComponent(username)}`);
    if(r.ok){
      const d=await r.json();
      if(Array.isArray(d)&&d.length>0&&d[0].proxyWallet)return d[0].proxyWallet;
      if(d?.proxyWallet)return d.proxyWallet;
    }
  }catch(e){}
  throw new Error(`Username "${username}" not found. Try the full 0x wallet address instead.`);
}

async function lookupTrader(){
  const raw=$('traderInput').value.trim();
  if(!raw)return;
  $('traderErr').classList.remove('show');
  $('traderResult').style.display='none';
  $('traderBtn').disabled=true;
  try{
    let addr=raw;
    if(!/^0x[0-9a-fA-F]{40}$/i.test(raw)){
      setTraderLoad('Resolving username…',true);
      addr=await resolveUsername(raw);
    }
    setTraderLoad('Loading data…',true);
    const [profile,positions,closed,activity,trades]=await Promise.allSettled([
      fetchJ(`${GAMMA}/profiles/${addr}`),
      fetchJ(`${DATA}/positions?user=${addr}&sizeThreshold=.1&sortBy=CURRENT&limit=50`),
      fetchJ(`${DATA}/positions?user=${addr}&redeemed=true&sortBy=CASHPNL&limit=30`),
      fetchJ(`${DATA}/activity?user=${addr}&limit=50`),
      fetchJ(`${DATA}/trades?user=${addr}&limit=50`),
    ]);
    setTraderLoad('',false);
    const p=profile.status==='fulfilled'?profile.value:null;
    const pos=positions.status==='fulfilled'&&Array.isArray(positions.value)?positions.value:[];
    const cl=closed.status==='fulfilled'&&Array.isArray(closed.value)?closed.value:[];
    const act=activity.status==='fulfilled'&&Array.isArray(activity.value)?activity.value:[];
    const tr=trades.status==='fulfilled'&&Array.isArray(trades.value)?trades.value:[];
    renderTraderProfile(addr,p,pos,tr);
    renderTraderStats(pos,cl,tr);
    renderPositions(pos);
    renderClosed(cl);
    renderActivity(act);
    renderTrades(tr);
    $('traderResult').style.display='block';
    switchSec('positions');
  }catch(e){
    setTraderLoad('',false);
    setTraderErr(e.message);
  }finally{$('traderBtn').disabled=false;}
}

function renderTraderStats(pos,cl,tr){
  const cur=pos.reduce((s,p)=>s+parseFloat(p.currentValue||0),0);
  const upnl=pos.reduce((s,p)=>s+parseFloat(p.cashPnl||0),0);
  const rpnl=cl.reduce((s,p)=>s+parseFloat(p.cashPnl||0),0);
  const vol=tr.reduce((s,t)=>s+parseFloat(t.size||0)*parseFloat(t.price||0),0);
  const wr=cl.length?cl.filter(p=>parseFloat(p.cashPnl||0)>0).length/cl.length*100:null;
  $('traderStats').innerHTML=[
    {lbl:'Portfolio Value',val:fmtMoney(cur,2),cls:'blue',sub:`${pos.length} open`},
    {lbl:'Unrealized P&L',val:fmtMoney(upnl,2),cls:upnl>=0?'green':'red',sub:cur>0?fmtPct(upnl/cur*100):''},
    {lbl:'Realized P&L',val:fmtMoney(rpnl,2),cls:rpnl>=0?'green':'red',sub:`${cl.length} closed`},
    {lbl:'Total Volume',val:fmtMoney(vol),cls:'purple',sub:`${tr.length} trades`},
    {lbl:'Win Rate',val:wr!==null?wr.toFixed(0)+'%':'—',cls:wr===null?'white':wr>=50?'green':'red',sub:'closed positions'},
    {lbl:'Buy / Sell',val:`${tr.filter(t=>t.side==='BUY').length} / ${tr.filter(t=>t.side==='SELL').length}`,cls:'orange',sub:'ratio'},
  ].map(s=>`<div class="stat-box"><div class="stat-label">${s.lbl}</div><div class="stat-val ${s.cls}">${s.val}</div>${s.sub?`<div class="stat-sub">${s.sub}</div>`:''}</div>`).join('');
}

  const markets=eventObj.markets||[];

  let html='';

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${vol?`<span class="badge badge-gray">Volume: ${fmtMoney(vol)}</span>`:''}
      ${liq?`<span class="badge badge-gray">Liquidity: ${fmtMoney(liq)}</span>`:''}

      ${eventObj.endDate?`<span class="badge badge-gray">Closes ${fmtDate(eventObj.endDate)}</span>`:''}

  </div>`;

  if(isMulti){
    html+=`<div class="modal-section">
      <div class="modal-section-title">Outcomes</div>
      ${markets.map(m=>{
        const mp=parseFloat(m.lastTradePrice||0);
        const mvol=parseFloat(m.volume||0);
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="flex:1;font-size:12px">${esc(m.groupItemTitle||m.question||'?')}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue);width:44px;text-align:right">${(mp*100).toFixed(1)}%</div>
          <div style="width:100px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${(mp*100).toFixed(1)}%;background:var(--blue);border-radius:2px"></div>
          </div>
          ${mvol?`<div style="font-size:11px;color:var(--muted);width:60px;text-align:right">${fmtMoney(mvol)}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // Orderbook for first/main market
  const mainMarket=markets[0];
  if(mainMarket?.clobTokenIds||mainMarket?.conditionId){
    html+=`<div class="modal-section" id="obSection">
      <div class="modal-section-title">Orderbook — Yes vs No</div>
      <div id="obContainer"><div class="loading" style="padding:20px 0"><div class="spinner"></div>Loading…</div></div>
    </div>`;
  }

  $('modalBody').innerHTML=html;

  // Fetch orderbook
  if(mainMarket){
    try{
      // Get token IDs
      let yesToken=null,noToken=null;
      if(mainMarket.clobTokenIds){
        const ids=JSON.parse(mainMarket.clobTokenIds||'[]');
        yesToken=ids[0];noToken=ids[1];
      }
      if(yesToken){
        const [yesOb,noOb]=await Promise.all([
          fetchJ(`${CLOB}/book?token_id=${yesToken}`).catch(()=>null),
          noToken?fetchJ(`${CLOB}/book?token_id=${noToken}`).catch(()=>null):null,
        ]);
        renderOrderbook(yesOb,noOb);
      }else{
        const obEl=$('obContainer');
        if(obEl)obEl.innerHTML='<div class="empty">Orderbook data unavailable for this market</div>';
      }
    }catch(e){
      const obEl=$('obContainer');
      if(obEl)obEl.innerHTML='<div class="empty">Could not load orderbook: '+esc(e.message)+'</div>';
    }
  }
}

function renderOrderbook(yesOb,noOb){
  const el=$('obContainer');
  if(!el)return;
  if(!yesOb&&!noOb){el.innerHTML='<div class="empty">No orderbook data</div>';return;}

  function obHalf(ob,label,isYes){
    if(!ob)return`<div class="ob-side"><div class="ob-title" style="color:${isYes?'var(--accent)':'var(--red)'}">${label}</div><div class="empty" style="padding:20px 0">No data</div></div>`;
    const bids=(ob.bids||[]).slice(0,8);
    const asks=(ob.asks||[]).slice(0,8);
    const maxSize=Math.max(...[...bids,...asks].map(o=>parseFloat(o.size||0)),1);
    const midPrice=ob.midpoint||((bids[0]&&asks[0])?(parseFloat(bids[0].price)+parseFloat(asks[0].price))/2:null);
    const spread=bids[0]&&asks[0]?parseFloat(asks[0].price)-parseFloat(bids[0].price):null;
    return`<div class="ob-side">
      <div class="ob-title" style="color:${isYes?'var(--accent)':'var(--red)'}">
        ${label} ${midPrice?`<span style="color:var(--blue);font-family:'JetBrains Mono',monospace">${(midPrice*100).toFixed(1)}¢</span>`:''}
      </div>
      ${spread!==null?`<div class="spread-box">Spread: ${(spread*100).toFixed(1)}¢ &nbsp;|&nbsp; Mid: ${midPrice?(midPrice*100).toFixed(1)+'¢':'—'}</div>`:''}
      <div class="ob-header"><span>PRICE</span><span>SIZE</span><span>TOTAL</span></div>
      <div style="margin-bottom:8px">
        ${asks.slice().reverse().map(a=>{
          const sz=parseFloat(a.size||0),pr=parseFloat(a.price||0);
          const fillW=Math.min(100,sz/maxSize*100);
          return`<div class="ob-row ob-ask">
            <div class="ob-fill" style="width:${fillW}%"></div>
            <span style="color:var(--red);font-family:'JetBrains Mono',monospace">${(pr*100).toFixed(1)}¢</span>
            <span style="font-family:'JetBrains Mono',monospace">${sz.toFixed(0)}</span>
            <span style="color:var(--muted);font-family:'JetBrains Mono',monospace">${fmtMoney(sz*pr,1)}</span>
          </div>`;
        }).join('')}
      </div>
      <div>
        ${bids.map(b=>{
          const sz=parseFloat(b.size||0),pr=parseFloat(b.price||0);
          const fillW=Math.min(100,sz/maxSize*100);
          return`<div class="ob-row ob-bid">
            <div class="ob-fill" style="width:${fillW}%"></div>
            <span style="color:var(--accent);font-family:'JetBrains Mono',monospace">${(pr*100).toFixed(1)}¢</span>
            <span style="font-family:'JetBrains Mono',monospace">${sz.toFixed(0)}</span>
            <span style="color:var(--muted);font-family:'JetBrains Mono',monospace">${fmtMoney(sz*pr,1)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  el.innerHTML=`<div class="ob-wrap">${obHalf(yesOb,'YES',true)}${obHalf(noOb,'NO',false)}</div>`;
}

  }catch(e){
    $('lbLoading').style.display='none';
    // Try fallback GAMMA leaderboard
    try{
      const data=await fetchJ(`${GAMMA}/leaderboard?window=${window}&limit=50`);
      const rows=Array.isArray(data)?data:(data.data||data.leaderboard||[]);
      renderLeaderboard(rows);
      lbLoaded=true;
    }catch(e2){
      $('lbErr').textContent='⚠ Could not load leaderboard: '+e.message;
      $('lbErr').classList.add('show');
    }
  }
}

function renderLeaderboard(rows){
  if(!rows.length){$('lbList').innerHTML='<div class="empty">No leaderboard data available</div>';return;}
  const rankClasses=['top1','top2','top3'];
  $('lbList').innerHTML=rows.slice(0,50).map((r,i)=>{
    const name=r.name||r.pseudonym||r.username||shortAddr(r.proxyWallet||r.address||'');
    const initial=(name||'?')[0].toUpperCase();
    const img=r.profileImage||r.profileImageOptimized;
    const addr=r.proxyWallet||r.address||'';
    const pnl=parseFloat(r.pnl||r.profit||r.totalPnl||0);
    const vol=parseFloat(r.volume||r.totalVolume||0);
    const wr=r.winRate||r.win_rate;
    const rank=r.rank||(i+1);
    return`<div class="lb-row" onclick="lookupFromLb('${addr}')">
      <div class="lb-rank ${rankClasses[i]||''}">#${rank}</div>
      <div class="lb-av">${img?`<img src="${esc(img)}" onerror="this.outerHTML='${initial}'" alt="">`:`${initial}`}</div>
      <div class="lb-info">
        <div class="lb-name">${esc(name)}</div>
        ${addr?`<div class="lb-addr">${shortAddr(addr)}</div>`:''}
      </div>
      <div class="lb-stats">
        ${pnl?`<div class="lb-stat"><div class="lb-stat-val ${pnl>=0?'green':'red'}">${fmtMoney(pnl,0)}</div><div class="lb-stat-lbl">P&L</div></div>`:''}
        ${vol?`<div class="lb-stat"><div class="lb-stat-val blue">${fmtMoney(vol)}</div><div class="lb-stat-lbl">Volume</div></div>`:''}
        ${wr!=null?`<div class="lb-stat"><div class="lb-stat-val ${parseFloat(wr)>=50?'green':'red'}">${parseFloat(wr).toFixed(0)}%</div><div class="lb-stat-lbl">Win</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function lookupFromLb(addr){
  if(!addr)return;
  showPage('trader');
  $('traderInput').value=addr;
  lookupTrader();
}

/* ─── SEARCH ENTER KEY ─── */
$('traderInput').addEventListener('keydown',e=>{if(e.key==='Enter')lookupTrader();});
$('marketInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchMarkets();});
</script>
</body>
