<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyView — Polymarket Explorer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a1628'/><text y='46' x='8' font-size='42'>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07101f;--card:#0c1a2e;--card2:#101f38;--b1:#1c3354;--b2:#234;
  --blue:#4f8ef7;--blue2:#7ab3ff;--blue3:#c7deff;
  --green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--purple:#9b59b6;
  --text:#d6eaff;--sub:#7fa8cc;--muted:#3d6080;--dim:#1a3050;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;padding-bottom:68px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 120% 60% at 50% -20%,rgba(79,142,247,.08),transparent 65%);pointer-events:none;z-index:0}

/* TOP BAR */
.topbar{background:rgba(7,16,31,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:100}
.topbar-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 15px}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;letter-spacing:-.5px;color:var(--text)}
.logo b{color:var(--blue2)}
.live-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* PAGES */
.page{display:none;max-width:860px;margin:0 auto;padding:14px 14px 16px;position:relative;z-index:1}
.page.active{display:block}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,16,31,.97);backdrop-filter:blur(16px);border-top:1px solid var(--b1);z-index:100;display:flex;height:60px}
.bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:.5px;transition:color .15s}
.bnav-tab.on{color:var(--blue2)}
.bnav-tab .ni{font-size:19px;line-height:1}

/* SEARCH ROW */
.srow{display:flex;gap:8px;margin-bottom:10px}
.sbox{flex:1;display:flex;align-items:center;background:var(--card);border:1.5px solid var(--b1);border-radius:9px;transition:border-color .2s;min-width:0}
.sbox:focus-within{border-color:var(--blue)}
.sicon{padding:0 11px;font-size:15px;color:var(--muted);flex-shrink:0}
.sbox input{flex:1;background:none;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 10px 11px 0;outline:none;min-width:0}
.sbox input::placeholder{color:var(--dim)}
.btn{padding:11px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;transition:all .15s;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#3a7aee}.btn-blue:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--card);border:1.5px solid var(--b1);color:var(--muted)}.btn-ghost:hover{color:var(--text)}
.chips{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:13px}
.chip-lbl{font-size:11px;color:var(--muted)}
.chip{padding:3px 10px;border-radius:5px;font-size:11px;background:var(--card2);border:1px solid var(--b1);color:var(--sub);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--blue);color:var(--blue2)}

/* ALERTS */
.err{background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.22);border-radius:8px;padding:10px 13px;color:#f1948a;font-size:12px;margin-bottom:12px;display:none}
.err.on{display:block}
.info{background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.2);border-radius:8px;padding:10px 13px;color:var(--blue3);font-size:12px;margin-bottom:12px;display:none}
.info.on{display:block}

/* LOADING */
.ld{display:none;text-align:center;padding:40px 20px}
.ld.on{display:block}
.spin{width:26px;height:26px;border:2.5px solid var(--b1);border-top-color:var(--blue);border-radius:50%;animation:spinr .7s linear infinite;margin:0 auto 10px}
@keyframes spinr{to{transform:rotate(360deg)}}
.spin-sm{width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spinr .6s linear infinite;display:inline-block;vertical-align:middle}
.ld-txt{font-size:12px;color:var(--muted)}
.empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:12px}

/* PROFILE */
.pcard{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:15px;margin-bottom:13px;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--blue2))}
.ptop{display:flex;align-items:center;gap:12px}
.av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;overflow:hidden;border:2px solid var(--b1)}
.av img{width:100%;height:100%;object-fit:cover}
.pname{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pname a{color:var(--muted);font-size:11px;text-decoration:none}.pname a:hover{color:var(--blue2)}
.paddr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);word-break:break-all;line-height:1.6}
.pbio{font-size:11px;color:var(--sub);margin-top:3px}
/* rank badge */
.rank-badge{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--blue2);font-family:'JetBrains Mono',monospace}
/* vol strip */
.vstrip{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)}
.vs{background:var(--card2);border:1px solid var(--b1);border-radius:7px;padding:8px 11px;flex:1;min-width:90px}
.vs-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.vs-v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}

/* STAT GRID */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:13px}
.scard{background:var(--card);border:1px solid var(--b1);border-radius:9px;padding:12px 13px}
.sc-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.sc-v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;line-height:1}
.sc-s{font-size:10px;color:var(--muted);margin-top:3px}
.cg{color:var(--green)}.cr{color:var(--red)}.cb{color:var(--blue2)}.cp{color:var(--purple)}.ca{color:var(--amber)}.cw{color:var(--text)}

/* INNER TABS */
.itabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:13px;overflow-x:auto;scrollbar-width:none}
.itabs::-webkit-scrollbar{display:none}
.itab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s}
.itab:hover{color:var(--text)}
.itab.on{color:var(--blue2);border-bottom-color:var(--blue2)}
.isec{display:none}.isec.on{display:block}

/* POSITION CARDS */
.poslist{display:flex;flex-direction:column;gap:7px}
.poscard{background:var(--card);border:1px solid var(--b1);border-radius:9px;padding:12px 13px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:border-color .15s}
.poscard:hover{border-color:var(--b2)}
.ptitle{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4}
.pmeta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.by{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.bn{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.bb{background:rgba(46,204,113,.1);color:var(--green)}.bs{background:rgba(231,76,60,.1);color:var(--red)}
.bg{background:var(--card2);color:var(--sub);border:1px solid var(--b1)}.bbl{background:rgba(79,142,247,.1);color:var(--blue2);border:1px solid rgba(79,142,247,.2)}
.mt{font-size:11px;color:var(--muted)}
.pr{text-align:right;min-width:86px}
.pval{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--blue2)}
.ppnl{font-size:11px;margin-top:2px}
.pb{height:3px;background:var(--b1);border-radius:2px;margin-top:7px;overflow:hidden}
.pbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--blue2))}

/* TABLES */
.twrap{overflow-x:auto;border-radius:9px;border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--b1);background:var(--card2);white-space:nowrap}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--dim);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(79,142,247,.025)}
.td-title{max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:var(--text);transition:color .12s}
.td-title:hover{color:var(--blue2)}
.tx-a{color:var(--purple);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:10px}
.tx-a:hover{color:var(--blue2)}
.mono{font-family:'JetBrains Mono',monospace}

/* SEC HEADER */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:2px;height:11px;background:var(--blue2);border-radius:2px}
.cbadge{font-size:10px;padding:2px 7px;border-radius:7px;background:var(--card2);border:1px solid var(--b1);color:var(--muted)}

/* PILLS */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px;align-items:center}
.pill{padding:5px 11px;border-radius:6px;font-size:12px;font-weight:500;border:1.5px solid var(--b1);background:var(--card2);color:var(--muted);cursor:pointer;transition:all .12s}
.pill:hover,.pill.on{border-color:var(--blue);color:var(--blue2);background:rgba(79,142,247,.07)}

/* MARKET CARDS */
.mlist{display:flex;flex-direction:column;gap:8px}
.mcard{background:var(--card);border:1px solid var(--b1);border-radius:9px;padding:13px 14px;cursor:pointer;transition:all .15s}
.mcard:hover{border-color:var(--blue);background:var(--card2)}
.mtitle{font-size:13px;font-weight:600;margin-bottom:7px;line-height:1.4}
.mbar{height:4px;background:var(--b1);border-radius:2px;margin:6px 0;overflow:hidden}
.mfill{height:100%;border-radius:2px}
.mmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:7px}
.mprob{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}

/* LEADERBOARD */
.lbrow{background:var(--card);border:1px solid var(--b1);border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .12s;margin-bottom:6px}
.lbrow:hover{border-color:var(--b2)}
.lbrank{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--muted);width:24px;text-align:center;flex-shrink:0}
.r1{color:#ffd700}.r2{color:#c0c0c0}.r3{color:#cd7f32}
.lbav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden}
.lbav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.lbname{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbsub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.lbnums{display:flex;gap:12px;flex-shrink:0}
.lbnum{text-align:right}
.lbnv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.lbnl{font-size:9px;color:var(--muted);margin-top:1px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;overflow-y:auto;padding:14px}
.overlay.on{display:block}
.mbox{background:var(--card);border:1px solid var(--b1);border-radius:12px;max-width:640px;margin:0 auto;padding:17px;position:relative}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--blue2));border-radius:12px 12px 0 0}
.mhdr{display:flex;gap:10px;margin-bottom:14px}
.mtitleM{font-size:14px;font-weight:700;line-height:1.4;flex:1}
.closebtn{width:27px;height:27px;flex-shrink:0;background:var(--card2);border:1px solid var(--b1);border-radius:6px;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.closebtn:hover{color:var(--text)}
.msec{margin-bottom:14px}
.msect{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b1)}

/* ORDERBOOK */
.obgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.obpanel{background:var(--card2);border:1px solid var(--b1);border-radius:7px;padding:10px}
.oblbl{font-size:11px;font-weight:700;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between}
.obcols{display:grid;grid-template-columns:1fr 1fr 1fr;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:2px 0 4px}
.obr{display:grid;grid-template-columns:1fr 1fr 1fr;padding:3px 0;font-size:11px;font-family:'JetBrains Mono',monospace;position:relative;border-bottom:1px solid rgba(26,48,80,.3)}
.obr:last-child{border-bottom:none}
.dep{position:absolute;top:0;bottom:0;opacity:.08;pointer-events:none}
.dep-a{background:var(--red);left:0}.dep-b{background:var(--green);right:0;left:auto}
.spread{text-align:center;font-size:11px;color:var(--sub);padding:4px;background:rgba(79,142,247,.05);border-radius:4px;margin:3px 0}
.outrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.outlbl{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.outpct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--blue2);width:36px;text-align:right;flex-shrink:0}
.outbar{width:75px;height:3px;background:var(--b1);border-radius:2px;overflow:hidden;flex-shrink:0}
.outfill{height:100%;background:var(--blue);border-radius:2px}

@media(max-width:480px){
  .obgrid{grid-template-columns:1fr}
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .lbnums{gap:8px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">Poly<b>View</b></div>
    <div class="live-pill"><div class="dot"></div>Live</div>
  </div>
</div>

<!-- ▓▓ TRADER PAGE ▓▓ -->
<div class="page active" id="page-trader">
  <div class="srow" style="margin-top:13px">
    <div class="sbox">
      <div class="sicon">⟡</div>
      <input id="tInput" placeholder="0x wallet address  or  username" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn btn-blue" id="tBtn">Lookup</button>
    <button class="btn btn-ghost" id="tClr">✕</button>
  </div>
  <div class="chips">
    <span class="chip-lbl">Try:</span>
    <button class="chip" id="tc1">cobie</button>
    <button class="chip" id="tc2">polymarket</button>
    <button class="chip" id="tc3">0x6af7…0ff1</button>
  </div>
  <div class="err" id="tErr"></div>
  <div class="info" id="tInfo"></div>
  <div class="ld" id="tLd"><div class="spin"></div><div class="ld-txt" id="tLdTxt">Looking up…</div></div>
  <div id="tRes" style="display:none">
    <div class="pcard" id="tProf"></div>
    <div class="sgrid" id="tStats"></div>
    <div class="itabs">
      <button class="itab on" data-s="positions">Positions</button>
      <button class="itab" data-s="closed">Closed</button>
      <button class="itab" data-s="activity">Activity</button>
      <button class="itab" data-s="trades">Trades</button>
    </div>
    <div class="isec on" id="s-positions"></div>
    <div class="isec" id="s-closed"></div>
    <div class="isec" id="s-activity"></div>
    <div class="isec" id="s-trades"></div>
  </div>
</div>

<!-- ▓▓ MARKETS PAGE ▓▓ -->
<div class="page" id="page-markets">
  <div class="srow" style="margin-top:13px">
    <div class="sbox">
      <div class="sicon">🔍</div>
      <input id="mInput" placeholder="Search markets… bitcoin, fed, election…" autocomplete="off">
    </div>
    <button class="btn btn-blue" id="mBtn">Search</button>
  </div>
  <div class="pills" id="mPills">
    <button class="pill on" data-f="volume">🔥 Top</button>
    <button class="pill" data-f="new">✨ New</button>
    <button class="pill" data-f="crypto">₿ Crypto</button>
    <button class="pill" data-f="politics">🗳 Politics</button>
    <button class="pill" data-f="sports">⚽ Sports</button>
  </div>
  <div class="err" id="mErr"></div>
  <div class="ld" id="mLd"><div class="spin"></div><div class="ld-txt">Loading markets…</div></div>
  <div id="mList"></div>
</div>

<!-- ▓▓ LEADERBOARD PAGE ▓▓ -->
<div class="page" id="page-leaderboard">
  <div style="display:flex;align-items:center;justify-content:space-between;margin:13px 0 11px">
    <div>
      <div style="font-size:17px;font-weight:800;margin-bottom:1px">Top Traders</div>
      <div style="font-size:11px;color:var(--muted)">Ranked by profit · Polymarket data</div>
    </div>
    <button class="btn btn-ghost" id="lbRefresh" style="font-size:12px;padding:8px 12px">↻ Refresh</button>
  </div>
  <div class="pills" id="lbPills">
    <button class="pill on" data-w="all">All Time</button>
    <button class="pill" data-w="30d">30 Days</button>
    <button class="pill" data-w="7d">7 Days</button>
    <button class="pill" data-w="1d">24h</button>
  </div>
  <div class="err" id="lbErr"></div>
  <div class="ld" id="lbLd"><div class="spin"></div><div class="ld-txt">Loading leaderboard…</div></div>
  <div id="lbList"></div>
</div>

<!-- ▓▓ MODAL ▓▓ -->
<div class="overlay" id="mktOv">
  <div class="mbox">
    <div class="mhdr">
      <div class="mtitleM" id="mktT"></div>
      <button class="closebtn" id="mktX">✕</button>
    </div>
    <div id="mktB"></div>
  </div>
</div>

<!-- ▓▓ BOTTOM NAV ▓▓ -->
<nav class="bnav">
  <button class="bnav-tab on" id="bn-trader"><span class="ni">👤</span><span>Trader</span></button>
  <button class="bnav-tab" id="bn-markets"><span class="ni">📊</span><span>Markets</span></button>
  <button class="bnav-tab" id="bn-leaderboard"><span class="ni">🏆</span><span>Leaders</span></button>
</nav>

<script>
/* ═══ CORRECT API ENDPOINTS ═══ */
var DATA  = 'https://data-api.polymarket.com';
var DATAv1= 'https://data-api.polymarket.com/v1';  /* leaderboard uses /v1/ */
var GAMMA = 'https://gamma-api.polymarket.com';
var CLOB  = 'https://clob.polymarket.com';

/* ═══ STATE ═══ */
var _mktsLoaded  = false;
var _lbLoaded    = false;
var _lbWindow    = 'all';
var _activityData = [];
var _eventsData   = [];

/* ═══ DOM HELPERS ═══ */
function ge(id) { return document.getElementById(id); }
function show(id) { var e=ge(id); if(e) e.classList.add('on'); }
function hide(id) { var e=ge(id); if(e) e.classList.remove('on'); }
function setTxt(id,txt) { var e=ge(id); if(e) e.textContent=txt||''; }
function showErr(id,msg) { var e=ge(id); if(!e)return; e.textContent='⚠ '+msg; e.classList.add('on'); }
function showInfo(id,msg) { var e=ge(id); if(!e)return; e.textContent=msg; e.classList.add('on'); }

/* ═══ UTILS ═══ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function trunc(s,n) { n=n||46; if(!s)return'—'; return s.length>n ? s.slice(0,n)+'…' : s; }
function short(a) { if(!a)return''; return a.slice(0,6)+'…'+a.slice(-4); }
function fm(v,d) {
  d=d||0; if(v==null||isNaN(v))return'—';
  var n=parseFloat(v);
  if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(Math.abs(n)>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(d);
}
function fp(v) { if(v==null||isNaN(v))return'—'; var n=parseFloat(v); return(n>=0?'+':'')+n.toFixed(1)+'%'; }
function fd(ts) {
  if(!ts)return'—';
  var ms=(typeof ts==='number'&&ts<1e12)?ts*1000:ts;
  return new Date(ms).toLocaleDateString('en',{month:'short',day:'numeric',year:'2-digit'});
}
function fj(url) {
  return fetch(url, { signal: AbortSignal.timeout(10000) })
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}

/* ═══ NAVIGATION ═══ */
function goPage(name) {
  ['trader','markets','leaderboard'].forEach(function(p) {
    var pg=ge('page-'+p), bn=ge('bn-'+p);
    if(pg) pg.classList.toggle('active', p===name);
    if(bn) bn.classList.toggle('on', p===name);
  });
  if(name==='markets'   && !_mktsLoaded) doLoadMkts('volume');
  if(name==='leaderboard' && !_lbLoaded)  doLb('all');
}

/* ═══ TRADER ═══ */
function tryTrader(val) { ge('tInput').value=val; doTrader(); }

function clearTrader() {
  ge('tInput').value='';
  hide('tErr'); hide('tInfo'); hide('tLd');
  ge('tRes').style.display='none';
}

function doTrader() {
  var raw = ge('tInput').value.trim();
  if (!raw) return;
  hide('tErr'); hide('tInfo');
  ge('tRes').style.display='none';
  ge('tBtn').disabled=true;
  ge('tBtn').innerHTML='<span class="spin-sm"></span>';
  show('tLd'); setTxt('tLdTxt','Resolving…');

  var isAddr = /^0x[0-9a-fA-F]{40}$/i.test(raw);
  var resolveP;

  if (isAddr) {
    resolveP = Promise.resolve({ addr: raw, meta: null });
  } else {
    /* Username lookup via /v1/leaderboard?userName=X */
    resolveP = fj(DATAv1 + '/leaderboard?userName=' + encodeURIComponent(raw))
      .then(function(d) {
        var list = Array.isArray(d) ? d : [];
        if (list.length > 0 && list[0].proxyWallet) {
          return { addr: list[0].proxyWallet, meta: list[0] };
        }
        throw new Error('Username "' + raw + '" not found on Polymarket.');
      });
  }

  resolveP.then(function(res) {
    var addr = res.addr;
    var lbMeta = res.meta;
    setTxt('tLdTxt','Fetching data…');
    return Promise.allSettled([
      fj(GAMMA + '/profiles/' + addr),
      fj(DATA  + '/positions?user='+addr+'&sizeThreshold=.1&sortBy=CURRENT&limit=50'),
      fj(DATA  + '/positions?user='+addr+'&redeemed=true&sortBy=CASHPNL&limit=30'),
      fj(DATA  + '/activity?user='+addr+'&limit=50'),
      fj(DATA  + '/trades?user='+addr+'&limit=50'),
      fj(DATAv1+ '/leaderboard?proxyWallet='+addr).catch(function(){return null;})
    ]).then(function(rs) {
      hide('tLd');
      var P  = rs[0].status==='fulfilled' ? rs[0].value : null;
      var pos= rs[1].status==='fulfilled' && Array.isArray(rs[1].value) ? rs[1].value : [];
      var cl = rs[2].status==='fulfilled' && Array.isArray(rs[2].value) ? rs[2].value : [];
      var act= rs[3].status==='fulfilled' && Array.isArray(rs[3].value) ? rs[3].value : [];
      var tr = rs[4].status==='fulfilled' && Array.isArray(rs[4].value) ? rs[4].value : [];
      var lb = rs[5].status==='fulfilled' && rs[5].value ? rs[5].value : null;
      var lbData = lbMeta || (Array.isArray(lb)?lb[0]:lb) || null;
      buildProfile(addr, P, pos, tr, lbData);
      buildStats(pos, cl, tr, lbData);
      buildPositions(pos);
      buildClosed(cl);
      buildActivity(act);
      buildTrades(tr);
      ge('tRes').style.display='block';
      switchTab('positions');
    });
  }).catch(function(err) {
    hide('tLd');
    showErr('tErr', err.message);
  }).finally(function() {
    ge('tBtn').disabled=false;
    ge('tBtn').textContent='Lookup';
  });
}

function buildProfile(addr, P, positions, trades, lbData) {
  var name = (P&&(P.name||P.pseudonym)) || (lbData&&lbData.userName) || short(addr);
  var init = (name||'?')[0].toUpperCase();
  var img  = (P&&(P.profileImage||P.profileImageOptimized)) || (lbData&&lbData.profileImage) || '';
  var xUser= lbData&&lbData.xUsername ? lbData.xUsername : '';
  var rank = lbData&&lbData.rank ? lbData.rank : null;
  var allVol= lbData&&lbData.vol
    ? parseFloat(lbData.vol)
    : trades.reduce(function(s,t){return s+parseFloat(t.size||0)*parseFloat(t.price||0);},0);
  var lbPnl = lbData&&lbData.pnl!=null ? parseFloat(lbData.pnl) : null;
  var mktCount = (function(){var s={};trades.forEach(function(t){if(t.conditionId)s[t.conditionId]=1;});return Object.keys(s).length||trades.length;})();

  var avHtml = img
    ? '<img src="'+esc(img)+'" onerror="this.style.display=\'none\'" alt="">'
    : init;

  var rankBadge = rank ? '<span class="rank-badge">Rank #'+esc(rank)+'</span>' : '';
  var xBadge = xUser ? '<span class="badge bg">@'+esc(xUser)+'</span>' : '';
  var verBadge = lbData&&lbData.verifiedBadge ? '<span class="badge bbl">✓ Verified</span>' : '';

  ge('tProf').innerHTML =
    '<div class="ptop">' +
      '<div class="av">'+avHtml+'</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="pname">'+esc(name)+rankBadge+xBadge+verBadge+
          '<a href="https://polymarket.com/profile/'+esc(addr)+'" target="_blank">↗ PM</a>' +
        '</div>' +
        '<div class="paddr">'+esc(addr)+'</div>' +
        (P&&P.bio ? '<div class="pbio">'+esc(P.bio)+'</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="vstrip">' +
      '<div class="vs"><div class="vs-l">Open</div><div class="vs-v cb">'+positions.length+'</div></div>' +
      '<div class="vs"><div class="vs-l">Markets</div><div class="vs-v cw">'+mktCount+'</div></div>' +
      '<div class="vs"><div class="vs-l">All-Time Vol</div><div class="vs-v cp">'+fm(allVol)+'</div></div>' +
      (lbPnl!==null ? '<div class="vs"><div class="vs-l">All-Time P&L</div><div class="vs-v '+(lbPnl>=0?'cg':'cr')+'">'+fm(lbPnl,2)+'</div></div>' : '') +
    '</div>';
}

function buildStats(positions, closed, trades, lbData) {
  var cur  = positions.reduce(function(s,p){return s+parseFloat(p.currentValue||0);},0);
  var upnl = positions.reduce(function(s,p){return s+parseFloat(p.cashPnl||0);},0);
  var rpnl = closed.reduce(function(s,p){return s+parseFloat(p.cashPnl||0);},0);
  var vol  = trades.reduce(function(s,t){return s+parseFloat(t.size||0)*parseFloat(t.price||0);},0);
  var wr   = closed.length ? (closed.filter(function(p){return parseFloat(p.cashPnl||0)>0;}).length/closed.length*100) : null;
  var buys = trades.filter(function(t){return t.side==='BUY';}).length;
  var sells= trades.filter(function(t){return t.side==='SELL';}).length;

  var items=[
    {l:'Portfolio Value',v:fm(cur,2),c:'cb',s:positions.length+' open'},
    {l:'Unrealized P&L', v:fm(upnl,2),c:upnl>=0?'cg':'cr',s:cur>0?fp(upnl/cur*100):'—'},
    {l:'Realized P&L',   v:fm(rpnl,2),c:rpnl>=0?'cg':'cr',s:closed.length+' closed'},
    {l:'Volume (Trades)',v:fm(vol),   c:'cp',s:trades.length+' trades'},
    {l:'Win Rate',       v:wr!==null?wr.toFixed(0)+'%':'—',c:wr!==null?(wr>=50?'cg':'cr'):'cw',s:'closed positions'},
    {l:'Buy / Sell',     v:buys+'/'+sells,c:'ca',s:'trade split'}
  ];
  ge('tStats').innerHTML = items.map(function(x){
    return '<div class="scard"><div class="sc-l">'+x.l+'</div><div class="sc-v '+x.c+'">'+x.v+'</div><div class="sc-s">'+x.s+'</div></div>';
  }).join('');
}

function switchTab(s) {
  document.querySelectorAll('.itab').forEach(function(t){ t.classList.toggle('on', t.dataset.s===s); });
  document.querySelectorAll('.isec').forEach(function(e){ e.classList.toggle('on', e.id==='s-'+s); });
}

function buildPositions(pos) {
  var el=ge('s-positions');
  if(!pos.length){el.innerHTML='<div class="empty">No open positions</div>';return;}
  var rows=pos.map(function(p){
    var cur=parseFloat(p.currentValue||0),pnl=parseFloat(p.cashPnl||0),pct=parseFloat(p.percentPnl||0),pr=parseFloat(p.curPrice||0);
    var isY=p.outcome==='Yes'; var pw=Math.min(100,pr*100).toFixed(1);
    return '<div class="poscard">'+
      '<div>'+
        '<div class="ptitle">'+esc(p.title||'Unknown')+'</div>'+
        '<div class="pmeta">'+
          '<span class="badge '+(isY?'by':'bn')+'">'+esc(p.outcome||'?')+'</span>'+
          '<span class="mt">Avg '+(parseFloat(p.avgPrice||0)*100).toFixed(1)+'¢</span>'+
          '<span class="mt">'+parseFloat(p.size||0).toFixed(0)+' shares</span>'+
          '<span class="mt">Now '+(pr*100).toFixed(1)+'¢</span>'+
        '</div>'+
        '<div class="pb"><div class="pbf" style="width:'+pw+'%"></div></div>'+
      '</div>'+
      '<div class="pr">'+
        '<div class="pval">'+fm(cur,2)+'</div>'+
        '<div class="ppnl '+(pnl>=0?'cg':'cr')+'">'+fm(pnl,2)+' ('+fp(pct)+')</div>'+
      '</div>'+
    '</div>';
  });
  el.innerHTML='<div class="shdr"><div class="stitle">Open Positions</div><span class="cbadge">'+pos.length+'</span></div>'+
    '<div class="poslist">'+rows.join('')+'</div>';
}

function buildClosed(cl) {
  var el=ge('s-closed');
  if(!cl.length){el.innerHTML='<div class="empty">No closed positions</div>';return;}
  var rows=cl.map(function(p){
    var pnl=parseFloat(p.cashPnl||0),pct=parseFloat(p.percentPnl||0);
    var isY=p.outcome==='Yes';
    return '<div class="poscard">'+
      '<div>'+
        '<div class="ptitle">'+esc(p.title||'Unknown')+'</div>'+
        '<div class="pmeta">'+
          '<span class="badge '+(isY?'by':'bn')+'">'+esc(p.outcome||'?')+'</span>'+
          '<span class="mt">'+parseFloat(p.size||0).toFixed(0)+' shares @ '+(parseFloat(p.avgPrice||0)*100).toFixed(1)+'¢</span>'+
        '</div>'+
      '</div>'+
      '<div class="pr">'+
        '<div class="pval '+(pnl>=0?'cg':'cr')+'">'+fm(pnl,2)+'</div>'+
        '<div class="ppnl '+(pnl>=0?'cg':'cr')+'">'+fp(pct)+'</div>'+
      '</div>'+
    '</div>';
  });
  el.innerHTML='<div class="shdr"><div class="stitle">Closed Positions</div><span class="cbadge">'+cl.length+'</span></div>'+
    '<div class="poslist">'+rows.join('')+'</div>';
}

var TC={BUY:'bb',SELL:'bs',TRADE:'bb',REDEEM:'bg',REWARD:'bbl',SPLIT:'bg',MERGE:'bg',CONVERSION:'bg'};

function buildActivity(act) {
  var el=ge('s-activity');
  if(!act.length){el.innerHTML='<div class="empty">No activity found</div>';return;}
  _activityData=act;
  var rows=act.map(function(a,i){
    var type=a.type||(a.side?'TRADE':'EVENT');
    var side=a.side||''; var tx=a.transactionHash||'';
    var sz=a.size?parseFloat(a.size):0; var pr=a.price?parseFloat(a.price):0;
    var tc=TC[type]||'bg'; var sc=side==='BUY'?'bb':(side==='SELL'?'bs':'');
    return '<tr>'+
      '<td><span class="badge '+tc+'">'+type+'</span></td>'+
      '<td><div class="td-title" onclick="openActMkt('+i+')" title="View market">'+esc(trunc(a.title||'—'))+'</div></td>'+
      '<td>'+(side?'<span class="badge '+sc+'">'+side+'</span>':'—')+'</td>'+
      '<td class="mono">'+(sz?sz.toFixed(2):'—')+'</td>'+
      '<td class="mono">'+(pr?(pr*100).toFixed(1)+'¢':'—')+'</td>'+
      '<td class="mono cb">'+(sz&&pr?fm(sz*pr,2):'—')+'</td>'+
      '<td>'+fd(a.timestamp)+'</td>'+
      '<td>'+(tx?'<a class="tx-a" href="https://polygonscan.com/tx/'+tx+'" target="_blank">'+short(tx)+'</a>':'—')+'</td>'+
    '</tr>';
  });
  el.innerHTML='<div class="shdr"><div class="stitle">Activity</div><span class="cbadge">'+act.length+'</span></div>'+
    '<div class="twrap"><table><thead><tr><th>Type</th><th>Market</th><th>Side</th><th>Size</th><th>Price</th><th>Value</th><th>Date</th><th>Tx</th></tr></thead>'+
    '<tbody>'+rows.join('')+'</tbody></table></div>';
}

function openActMkt(idx) {
  var a=_activityData[idx]; if(!a)return;
  ge('mktT').textContent=a.title||'Market';
  ge('mktB').innerHTML='<div class="ld on" style="padding:20px 0"><div class="spin"></div></div>';
  ge('mktOv').classList.add('on');
  var slug=a.slug||a.eventSlug||''; var cid=a.conditionId||'';
  var p1=slug?fj(GAMMA+'/events?slug='+encodeURIComponent(slug)+'&limit=1').catch(function(){return null;}):Promise.resolve(null);
  var p2=cid?fj(GAMMA+'/markets/'+cid).catch(function(){return null;}):Promise.resolve(null);
  Promise.all([p1,p2]).then(function(res){
    var ev=res[0]; if(Array.isArray(ev))ev=ev[0];
    if(!ev)ev=res[1];
    buildMktModal(ev,a);
  }).catch(function(){ buildMktModal(null,a); });
}

function buildTrades(tr) {
  var el=ge('s-trades');
  if(!tr.length){el.innerHTML='<div class="empty">No trades found</div>';return;}
  var rows=tr.map(function(t){
    var side=t.side||'?'; var sz=parseFloat(t.size||0),pr=parseFloat(t.price||0);
    return '<tr>'+
      '<td><span class="badge '+(side==='BUY'?'bb':'bs')+'">'+side+'</span></td>'+
      '<td><div class="td-title">'+esc(trunc(t.title||t.market||'—'))+'</div></td>'+
      '<td><span class="badge '+(t.outcome==='Yes'?'by':'bn')+'">'+esc(t.outcome||'?')+'</span></td>'+
      '<td class="mono">'+(pr*100).toFixed(1)+'¢</td>'+
      '<td class="mono">'+sz.toFixed(1)+'</td>'+
      '<td class="mono cb">'+fm(sz*pr,2)+'</td>'+
    '</tr>';
  });
  el.innerHTML='<div class="shdr"><div class="stitle">Trades</div><span class="cbadge">'+tr.length+'</span></div>'+
    '<div class="twrap"><table><thead><tr><th>Side</th><th>Market</th><th>Outcome</th><th>Price</th><th>Shares</th><th>Value</th></tr></thead>'+
    '<tbody>'+rows.join('')+'</tbody></table></div>';
}

/* ═══ MARKET MODAL ═══ */
function buildMktModal(ev, actData) {
  var title=(ev&&(ev.title||ev.question))||(actData&&actData.title)||'Market';
  ge('mktT').textContent=title;
  var markets=ev?(ev.markets||[]):[];
  var isMulti=markets.length>1; var m0=markets[0]||{};
  var vol=parseFloat(ev?(ev.volume||m0.volume||0):0);
  var liq=parseFloat(ev?(ev.liquidity||m0.liquidity||0):0);
  var price=parseFloat(m0.lastTradePrice||0);
  var html='';

  /* info */
  var badges='';
  if(vol) badges+='<span class="badge bg">Vol: '+fm(vol)+'</span> ';
  if(liq) badges+='<span class="badge bg">Liq: '+fm(liq)+'</span> ';
  if(ev&&ev.category) badges+='<span class="badge bbl">'+esc(ev.category)+'</span> ';
  if(ev&&ev.endDate) badges+='<span class="badge bg">Closes '+fd(ev.endDate)+'</span> ';
  if(ev&&ev.slug) badges+='<a href="https://polymarket.com/event/'+esc(ev.slug)+'" target="_blank" class="badge bbl" style="text-decoration:none">View on Polymarket ↗</a>';
  if(badges) html+='<div class="msec"><div class="msect">Market Info</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+badges+'</div></div>';

  /* trade context */
  if(actData&&actData.side){
    var sc2=actData.side==='BUY'?'bb':'bs'; var oc2=actData.outcome==='Yes'?'by':'bn';
    html+='<div class="msec"><div class="msect">Your Trade</div>'+
      '<div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">'+
        '<span class="badge '+sc2+'">'+esc(actData.side)+'</span>'+
        '<span class="badge '+oc2+'">'+esc(actData.outcome||'?')+'</span>'+
        (actData.size?'<span class="badge bg">'+parseFloat(actData.size).toFixed(2)+' shares</span>':'')+
        (actData.price?'<span class="badge bg">@ '+(parseFloat(actData.price)*100).toFixed(1)+'¢</span>':'')+
        '<span style="font-size:11px;color:var(--muted)">'+fd(actData.timestamp)+'</span>'+
      '</div></div>';
  }

  /* outcomes */
  if(isMulti){
    var outs=markets.map(function(m){
      var mp=parseFloat(m.lastTradePrice||0); var mpw=(mp*100).toFixed(1);
      return '<div class="outrow">'+
        '<div class="outlbl">'+esc(trunc(m.groupItemTitle||m.question||'?',36))+'</div>'+
        '<div class="outpct">'+(mp*100).toFixed(0)+'%</div>'+
        '<div class="outbar"><div class="outfill" style="width:'+mpw+'%;background:'+(mp>=.5?'var(--green)':'var(--blue)')+'"></div></div>'+
        (m.volume?'<span style="font-size:10px;color:var(--muted);min-width:36px;text-align:right">'+fm(m.volume)+'</span>':'')+
      '</div>';
    }).join('');
    html+='<div class="msec"><div class="msect">Outcomes ('+markets.length+')</div>'+outs+'</div>';
  } else if(price>0){
    var pw=(price*100).toFixed(1); var pc=price>=.5?'var(--green)':'var(--red)';
    html+='<div class="msec"><div class="msect">Current Probability</div>'+
      '<div style="display:flex;align-items:center;gap:12px">'+
        '<div style="font-family:JetBrains Mono,monospace;font-size:28px;font-weight:700;color:'+pc+'">'+pw+'%</div>'+
        '<div style="flex:1"><div class="mbar"><div class="mfill" style="width:'+pw+'%;background:'+pc+'"></div></div>'+
        '<div style="font-size:11px;color:var(--muted)">Yes probability</div></div>'+
      '</div></div>';
  }

  /* orderbook */
  var clobIds=[];
  try{ if(m0.clobTokenIds) clobIds=JSON.parse(m0.clobTokenIds); }catch(e){}
  if(clobIds.length>0){
    html+='<div class="msec"><div class="msect">Orderbook</div><div id="obC"><div class="ld on" style="padding:10px 0"><div class="spin"></div></div></div></div>';
    ge('mktB').innerHTML=html;
    var t0=clobIds[0], t1=clobIds[1]||null;
    Promise.all([
      fj(CLOB+'/book?token_id='+t0).catch(function(){return null;}),
      t1?fj(CLOB+'/book?token_id='+t1).catch(function(){return null;}):Promise.resolve(null)
    ]).then(function(obs){
      var el2=ge('obC'); if(el2) el2.innerHTML=buildOb(obs[0],obs[1]);
    });
    return;
  }
  ge('mktB').innerHTML=html||'<div class="empty">No detail available</div>';
}

function buildOb(yOb,nOb){
  function side(ob,lbl,isY){
    var lc=isY?'var(--green)':'var(--red)';
    if(!ob)return '<div class="obpanel"><div class="oblbl"><span style="color:'+lc+'">'+lbl+'</span></div><div class="empty" style="padding:10px 0;font-size:11px">No data</div></div>';
    var bids=(ob.bids||[]).slice(0,7); var asks=(ob.asks||[]).slice(0,7);
    var mid=ob.midpoint?parseFloat(ob.midpoint):0;
    var sp=(bids.length&&asks.length)?(parseFloat(asks[0].price)-parseFloat(bids[0].price)):0;
    var all=bids.concat(asks).map(function(x){return parseFloat(x.size||0);}); var mx=Math.max.apply(null,all.concat([1]));
    var midH=mid?'<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--blue2)">'+(mid*100).toFixed(1)+'¢</span>':'';
    var spH=sp>0?'<div class="spread">Spread '+(sp*100).toFixed(1)+'¢ · Mid '+(mid?(mid*100).toFixed(1)+'¢':'—')+'</div>':'';
    var askR=asks.slice().reverse().map(function(a){
      var s=parseFloat(a.size||0),p=parseFloat(a.price||0),fw=Math.min(100,s/mx*100).toFixed(0);
      return '<div class="obr"><div class="dep dep-a" style="width:'+fw+'%"></div>'+
        '<span style="color:var(--red)">'+(p*100).toFixed(1)+'¢</span>'+
        '<span>'+s.toFixed(0)+'</span>'+
        '<span style="color:var(--muted)">'+fm(s*p,1)+'</span></div>';
    }).join('');
    var bidR=bids.map(function(b){
      var s=parseFloat(b.size||0),p=parseFloat(b.price||0),fw=Math.min(100,s/mx*100).toFixed(0);
      return '<div class="obr"><div class="dep dep-b" style="width:'+fw+'%"></div>'+
        '<span style="color:var(--green)">'+(p*100).toFixed(1)+'¢</span>'+
        '<span>'+s.toFixed(0)+'</span>'+
        '<span style="color:var(--muted)">'+fm(s*p,1)+'</span></div>';
    }).join('');
    return '<div class="obpanel">'+
      '<div class="oblbl"><span style="color:'+lc+';font-weight:700">'+lbl+'</span>'+midH+'</div>'+
      spH+
      '<div class="obcols"><span>Price</span><span>Size</span><span>Total</span></div>'+
      askR+'<div style="height:2px;background:var(--b1);margin:3px 0"></div>'+bidR+
    '</div>';
  }
  return '<div class="obgrid">'+side(yOb,'YES',true)+side(nOb,'NO',false)+'</div>';
}

function closeMkt(){ ge('mktOv').classList.remove('on'); }

/* ═══ MARKETS ═══ */
function doLoadMkts(filter) {
  _mktsLoaded=true;
  hide('mErr'); show('mLd'); ge('mList').innerHTML='';
  var bases=[
    GAMMA+'/events?active=true&limit=20&order=volume&ascending=false',
    GAMMA+'/events?limit=20&order=volume&ascending=false'
  ];
  if(filter==='new') bases=[GAMMA+'/events?active=true&limit=20&order=createdAt&ascending=false'];
  else if(filter==='crypto') bases=[GAMMA+'/events?active=true&tag_slug=crypto&limit=20&order=volume&ascending=false'].concat(bases);
  else if(filter==='politics') bases=[GAMMA+'/events?active=true&tag_slug=politics&limit=20&order=volume&ascending=false'].concat(bases);
  else if(filter==='sports') bases=[GAMMA+'/events?active=true&tag_slug=sports&limit=20&order=volume&ascending=false'].concat(bases);

  function tryUrl(i){
    if(i>=bases.length) return Promise.reject(new Error('Markets unavailable. Check your connection.'));
    return fj(bases[i]).then(function(d){
      var list=Array.isArray(d)?d:(d.events||d.data||[]);
      if(list.length>0)return list;
      return tryUrl(i+1);
    }).catch(function(){return tryUrl(i+1);});
  }
  tryUrl(0).then(function(events){
    hide('mLd'); renderMkts(events);
  }).catch(function(err){
    hide('mLd'); showErr('mErr',err.message);
  });
}

function doSearchMkts(){
  var q=ge('mInput').value.trim(); if(!q)return;
  hide('mErr'); show('mLd'); ge('mList').innerHTML='';
  ge('mBtn').disabled=true; ge('mBtn').innerHTML='<span class="spin-sm"></span>';
  var urls=[
    GAMMA+'/events?q='+encodeURIComponent(q)+'&limit=20&order=volume&ascending=false',
    GAMMA+'/events?q='+encodeURIComponent(q)+'&active=true&limit=20',
    GAMMA+'/search?q='+encodeURIComponent(q)+'&type=event&limit=20',
    GAMMA+'/events?active=true&limit=20&order=volume&ascending=false'
  ];
  function tryUrl(i){
    if(i>=urls.length)return Promise.reject(new Error('No markets found for "'+q+'"'));
    return fj(urls[i]).then(function(d){
      var list=Array.isArray(d)?d:(d.events||d.data||d.results||[]);
      if(list.length>0)return list;
      return tryUrl(i+1);
    }).catch(function(){return tryUrl(i+1);});
  }
  tryUrl(0).then(function(events){
    hide('mLd'); ge('mBtn').disabled=false; ge('mBtn').textContent='Search'; renderMkts(events);
  }).catch(function(err){
    hide('mLd'); ge('mBtn').disabled=false; ge('mBtn').textContent='Search'; showErr('mErr',err.message);
  });
}

function renderMkts(events){
  _eventsData=events;
  if(!events.length){ge('mList').innerHTML='<div class="empty">No markets found</div>';return;}
  var cards=events.map(function(e,i){
    var mkts=e.markets||[]; var m0=mkts[0]||{};
    var price=parseFloat(m0.lastTradePrice||0); var vol=parseFloat(e.volume||m0.volume||0);
    var liq=parseFloat(e.liquidity||m0.liquidity||0); var isM=mkts.length>1;
    var pc=price>=.5?'var(--green)':'var(--red)'; var pw=(price*100).toFixed(1);
    var outH='';
    if(isM){
      outH='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px">'+
        mkts.slice(0,5).map(function(m){
          var mp=parseFloat(m.lastTradePrice||0);
          return '<span class="badge bg">'+esc(trunc(m.groupItemTitle||m.question||'?',18))+
            ' <b style="color:var(--blue2)">'+(mp*100).toFixed(0)+'%</b></span>';
        }).join('')+
        (mkts.length>5?'<span class="badge bg">+'+(mkts.length-5)+'</span>':'')+
      '</div>';
    } else {
      outH='<div class="mbar"><div class="mfill" style="width:'+pw+'%;background:'+pc+'"></div></div>';
    }
    var metaH='';
    if(!isM&&price) metaH+='<span class="mprob" style="color:'+pc+'">'+pw+'%</span>';
    if(vol)  metaH+='<span class="badge bg">Vol '+fm(vol)+'</span>';
    if(liq)  metaH+='<span class="badge bg">Liq '+fm(liq)+'</span>';
    if(e.category) metaH+='<span class="badge bbl">'+esc(e.category)+'</span>';
    return '<div class="mcard" onclick="openMktModal('+i+')">'+
      '<div class="mtitle">'+esc(e.title||e.question||'Unknown')+'</div>'+
      outH+'<div class="mmeta">'+metaH+'</div>'+
    '</div>';
  });
  ge('mList').innerHTML='<div class="shdr" style="margin-bottom:9px"><div class="stitle">Markets</div><span class="cbadge">'+events.length+'</span></div>'+
    '<div class="mlist">'+cards.join('')+'</div>';
}

function openMktModal(idx){
  var ev=_eventsData[idx]; if(!ev)return;
  ge('mktT').textContent=ev.title||'Market';
  ge('mktB').innerHTML='<div class="ld on"><div class="spin"></div></div>';
  ge('mktOv').classList.add('on');
  buildMktModal(ev,null);
}

/* ═══ LEADERBOARD ═══ */
/* Correct endpoint: data-api.polymarket.com/v1/leaderboard */
function doLb(w){
  _lbWindow=w; _lbLoaded=true;
  hide('lbErr'); show('lbLd'); ge('lbList').innerHTML='';
  /* Try v1 endpoint first, then fallback */
  var urls=[
    DATAv1+'/leaderboard?limit=50',
    DATAv1+'/leaderboard',
    DATA+'/leaderboard?limit=50',
    DATA+'/leaderboard'
  ];
  function tryUrl(i){
    if(i>=urls.length)return Promise.reject(new Error('Leaderboard not available'));
    return fj(urls[i]).then(function(d){
      var list=Array.isArray(d)?d:(d.data||d.leaderboard||d.results||[]);
      if(list.length>0)return list;
      return tryUrl(i+1);
    }).catch(function(){return tryUrl(i+1);});
  }
  tryUrl(0).then(function(rows){
    hide('lbLd'); renderLb(rows);
  }).catch(function(err){
    hide('lbLd'); showErr('lbErr','Leaderboard unavailable: '+err.message);
  });
}

function renderLb(rows){
  if(!rows.length){ge('lbList').innerHTML='<div class="empty">No data</div>';return;}
  var rc=['r1','r2','r3'];
  ge('lbList').innerHTML=rows.slice(0,50).map(function(r,i){
    /* exact fields from curl: rank,proxyWallet,userName,xUsername,verifiedBadge,vol,pnl,profileImage */
    var name=r.userName||r.name||r.pseudonym||short(r.proxyWallet||r.address||'');
    var init=(name||'?')[0].toUpperCase();
    var img=r.profileImage||r.profileImageOptimized||'';
    var addr=r.proxyWallet||r.address||'';
    var pnl=parseFloat(r.pnl||r.profit||r.totalPnl||0);
    var vol=parseFloat(r.vol||r.volume||r.totalVolume||0);
    var rank=r.rank||(i+1);
    var wr=r.winRate||r.win_rate;
    var xU=r.xUsername?'@'+r.xUsername:'';
    var avH=img?'<img src="'+esc(img)+'" onerror="this.style.display=\'none\'" alt="">':init;
    var nums='';
    if(pnl) nums+='<div class="lbnum"><div class="lbnv '+(pnl>=0?'cg':'cr')+'">'+fm(pnl,0)+'</div><div class="lbnl">P&L</div></div>';
    if(vol) nums+='<div class="lbnum"><div class="lbnv cb">'+fm(vol)+'</div><div class="lbnl">Vol</div></div>';
    if(wr!=null) nums+='<div class="lbnum"><div class="lbnv '+(parseFloat(wr)>=50?'cg':'cr')+'">'+parseFloat(wr).toFixed(0)+'%</div><div class="lbnl">Win</div></div>';
    return '<div class="lbrow" onclick="lbTrader(\''+esc(addr)+'\')">'+
      '<div class="lbrank '+(rc[i]||'')+'">#'+rank+'</div>'+
      '<div class="lbav">'+avH+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="lbname">'+esc(name)+(r.verifiedBadge?'<span class="badge bbl" style="margin-left:5px;font-size:9px">✓</span>':'')+'</div>'+
        '<div class="lbsub">'+esc(xU||short(addr))+'</div>'+
      '</div>'+
      '<div class="lbnums">'+nums+'</div>'+
    '</div>';
  }).join('');
}

function lbTrader(addr){ if(!addr)return; goPage('trader'); ge('tInput').value=addr; doTrader(); }

/* ═══ BIND EVENTS ═══ */
document.addEventListener('DOMContentLoaded',function(){
  /* Bottom nav */
  ge('bn-trader').addEventListener('click',function(){goPage('trader');});
  ge('bn-markets').addEventListener('click',function(){goPage('markets');});
  ge('bn-leaderboard').addEventListener('click',function(){goPage('leaderboard');});

  ge('tBtn').addEventListener('click', doTrader);
  ge('tClr').addEventListener('click', clearTrader);
  ge('tInput').addEventListener('keydown',function(e){if(e.key==='Enter')doTrader();});
  ge('tc1').addEventListener('click',function(){tryTrader('cobie');});
  ge('tc2').addEventListener('click',function(){tryTrader('polymarket');});
  ge('tc3').addEventListener('click',function(){tryTrader('0x6af75d4e4aaf700450efbac3708cce1665810ff1');});

  /* Inner tabs */
  document.querySelectorAll('.itab').forEach(function(t){
    t.addEventListener('click',function(){switchTab(t.dataset.s);});
  });

  /* Markets pills */
  document.querySelectorAll('#mPills .pill').forEach(function(p){
    p.addEventListener('click',function(){
      document.querySelectorAll('#mPills .pill').forEach(function(x){x.classList.remove('on');});

  /* Leaderboard pills */
  document.querySelectorAll('#lbPills .pill').forEach(function(p){

      document.querySelectorAll('#lbPills .pill').forEach(function(x){x.classList.remove('on');});
      p.classList.add('on'); doLb(p.dataset.w);
    });
  });
  ge('lbRefresh').addEventListener('click',function(){doLb(_lbWindow);});

  /* Modal */
  ge('mktX').addEventListener('click', closeMkt);
  ge('mktOv').addEventListener('click',function(e){if(e.target===ge('mktOv'))closeMkt();});
});
